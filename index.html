<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="90일 프로젝트">
<meta name="theme-color" content="#0D0D0D">
<title>90일 인간개조 프로젝트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Black+Han+Sans&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F7F3;
  --surface: #F0EDE6;
  --surface2: #E8E4DC;
  --card: #FFFFFF;
  --border: rgba(28,26,20,0.08);
  --border2: rgba(28,26,20,0.04);
  --text: #1C1A14;
  --text2: #6B6560;
  --text3: #B0A99F;
  --accent: #C4991A;
  --accent2: #D4AA2A;
  --accent-dim: rgba(196,153,26,0.1);
  --green: #2A7D5F;
  --green-dim: rgba(42,125,95,0.1);
  --red: #C0392B;
  --red-dim: rgba(192,57,43,0.1);
  --r: 12px; --rs: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.hdr { background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 16px 0; }
.hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.hdr-title { font-family: 'Black Han Sans', sans-serif; font-size: 16px; color: var(--accent); letter-spacing: 0.02em; }
.hdr-day { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); background: var(--surface); padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); }
.top-tabs { display: flex; }
.ttab { flex: 1; padding: 8px 4px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); font-size: 12px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; margin-bottom: -1px; transition: color .15s; }
.ttab.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
.screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px 14px 86px; }
.screen::-webkit-scrollbar { display: none; }
.panel { display: none; }
.panel.on { display: block; }
.bnav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
.nbtn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 9px 4px 7px; background: none; border: none; cursor: pointer; color: var(--text3); font-size: 10px; gap: 3px; font-family: 'Noto Sans KR', sans-serif; }
.nbtn .ico { font-size: 18px; }
.nbtn.on { color: var(--accent); }
.dnav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.dnav-btn { background: none; border: 1px solid var(--border); border-radius: var(--rs); color: var(--text2); padding: 5px 14px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
.dnav-lbl { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); font-weight: 500; }
.dday-card { background: linear-gradient(135deg, var(--accent-dim), var(--surface)); border: 1px solid rgba(196,153,26,0.2); border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.dday-num { font-family: 'Black Han Sans', sans-serif; font-size: 36px; color: var(--accent); line-height: 1; }
.dday-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.dday-right { text-align: right; }
.dday-pct { font-family: 'DM Mono', monospace; font-size: 22px; color: var(--text); font-weight: 500; }
.dday-pct-lbl { font-size: 10px; color: var(--text3); margin-top:2px; }
.progress-track { width: 120px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .4s; }
.section-title { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: .08em; padding: 4px 2px 8px; display: flex; align-items: center; justify-content: space-between; }
.section-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); }
.check-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 6px; overflow: hidden; transition: border-color .15s; }
.check-item.done { border-color: rgba(76,175,125,0.3); }
.check-top { display: flex; align-items: center; gap: 10px; padding: 11px 14px; }
.check-box { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all .15s; }
.check-box.done { background: var(--green); border-color: var(--green); }
.check-box.done::after { content: '✓'; font-size: 12px; color: #fff; font-weight: 700; }
.check-label { flex: 1; font-size: 14px; color: var(--text); cursor: pointer; }
.check-item.done .check-label { color: var(--text3); text-decoration: line-through; }
.check-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); background: var(--surface); padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.check-note-row { padding: 0 14px 10px 46px; display: none; }
.check-item.done .check-note-row { display: block; }
.check-item.note-open .check-note-row { display: block; }
.check-note { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rs); padding: 7px 10px; font-size: 12px; color: var(--text2); font-family: 'Noto Sans KR', sans-serif; outline: none; resize: none; min-height: 32px; line-height: 1.5; }
.check-note::placeholder { color: var(--text3); }
.check-note:focus { border-color: rgba(196,153,26,0.3); }
.stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.stat-label { font-size: 12px; color: var(--text2); min-width: 80px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
.stat-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 32px; text-align: right; }
.fcard { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 10px; }
.frow { display: flex; align-items: center; padding: 11px 14px; border-bottom: 1px solid var(--border2); gap: 8px; }
.frow:last-child { border-bottom: none; }
.flbl { font-size: 12px; color: var(--text3); min-width: 52px; flex-shrink: 0; }
.finp { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; text-align: right; }
.finp::placeholder { color: var(--text3); }
.finp[type=number] { -moz-appearance: textfield; }
.finp[type=number]::-webkit-outer-spin-button,
.finp[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
.ex-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border2); }
.ex-item:last-child { border-bottom: none; }
.ex-chip { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; color: var(--text2); cursor: pointer; white-space: nowrap; transition: all .12s; }
.ex-chip.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.ex-min-inp { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rs); padding: 5px 8px; font-size: 13px; color: var(--text); font-family: 'DM Mono', monospace; text-align: center; outline: none; width: 60px; }
.ex-unit { font-size: 12px; color: var(--text3); }
.water-dots { display: flex; gap: 7px; flex-wrap: wrap; }
.wd { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .12px; }
.wd.on { background: rgba(100,180,255,0.15); border-color: rgba(100,180,255,0.5); }
.save-btn { width: 100%; padding: 13px; border-radius: var(--r); background: var(--accent); color: #fff; font-family: 'Black Han Sans', sans-serif; font-size: 15px; letter-spacing: 0.05em; border: none; cursor: pointer; margin-top: 4px; }
.save-btn:active { opacity: .85; }
.week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.week-nav button { background: none; border: 1px solid var(--border); border-radius: var(--rs); color: var(--text2); padding: 5px 14px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
.week-lbl { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 12px; }
.wday { background: var(--card); border: 1px solid var(--border); border-radius: var(--rs); padding: 8px 4px; text-align: center; cursor: pointer; transition: border-color .15s; }
.wday.today { border-color: rgba(196,153,26,0.4); }
.wday.sel { background: var(--accent-dim); border-color: var(--accent); }
.wday-name { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.wday-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); margin-bottom: 5px; }
.wday-pct { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
.wday-pct.full { color: var(--green); }
.wday-pct.empty { color: var(--text3); }
.wday-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.wday-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
.detail-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; margin-bottom: 10px; }
.detail-date { font-size: 13px; color: var(--accent); font-weight: 700; margin-bottom: 10px; font-family: 'DM Mono', monospace; }
.detail-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border2); font-size: 12px; }
.detail-row:last-child { border-bottom: none; }
.detail-lbl { color: var(--text3); min-width: 40px; flex-shrink: 0; }
.detail-val { color: var(--text2); flex: 1; line-height: 1.5; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 12px; }
.cal-head { font-size: 10px; color: var(--text3); text-align: center; padding: 4px 0; }
.cal-day { border-radius: var(--rs); padding: 5px 2px; text-align: center; min-height: 48px; cursor: pointer; transition: background .12s; }
.cal-day.has { background: rgba(0,0,0,.02); }
.cal-day.sel { background: var(--accent-dim); border: 1px solid rgba(196,153,26,0.3); }
.cal-day.today .cdn { color: var(--accent); font-weight: 700; }
.cal-day.other { opacity: .25; }
.cdn { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.cpct { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); }
.cbar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin: 3px 2px 0; }
.cbar-fill { height: 100%; border-radius: 1px; background: var(--accent); }
.sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.sum-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; }
.sum-lbl { font-size: 10px; color: var(--text3); margin-bottom: 5px; }
.sum-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--text); }
.sum-val.g { color: var(--green); }
.sum-val.y { color: var(--accent); }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; padding: 9px 20px; border-radius: 22px; display: none; z-index: 999; white-space: nowrap; }
.empty { text-align: center; padding: 32px 0; color: var(--text3); font-size: 13px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; margin-bottom: 10px; }
.card-lbl { font-size: 11px; color: var(--text3); letter-spacing: .06em; margin-bottom: 10px; font-weight: 500; }
.cond-btn { flex:1; padding: 6px 2px; border-radius: var(--rs); border: 1px solid var(--border); background: none; color: var(--text3); font-size: 11px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; text-align: center; transition: all .12s; white-space: nowrap; }
.cond-btn.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">🔥 90일 인간개조</div>
      <div class="hdr-day" id="hdr-day">D-?</div>
    </div>
    <div class="top-tabs" id="top-tabs" style="display:none">
      <button class="ttab on" id="ttab-daily" onclick="sv('daily')">일간</button>
      <button class="ttab" id="ttab-weekly" onclick="sv('weekly')">주간</button>
      <button class="ttab" id="ttab-monthly" onclick="sv('monthly')">월간</button>
    </div>
  </div>
  <div class="screen">
    <div class="panel on" id="panel-input">
      <div class="dnav">
        <button class="dnav-btn" onclick="changeDay(-1)">‹</button>
        <span class="dnav-lbl" id="inp-day-lbl"></span>
        <button class="dnav-btn" onclick="changeDay(1)">›</button>
      </div>
      <div class="dday-card">
        <div class="dday-left">
          <div class="dday-num" id="dday-num">D-1</div>
          <div class="dday-sub" id="dday-sub">프로젝트 시작일 미설정</div>
        </div>
        <div class="dday-right">
          <div class="dday-pct" id="dday-pct">0%</div>
          <div class="dday-pct-lbl">달성률</div>
          <div class="progress-track"><div class="progress-fill" id="dday-bar" style="width:0%"></div></div>
        </div>
      </div>
      <div class="section-title">
        <span>오늘의 체크리스트</span>
        <span class="section-count" id="check-count">0/12</span>
      </div>
      <div id="checklist"></div>
      <div class="card-lbl" style="margin-top:4px">체중 & 식단</div>
      <div class="fcard">
        <div class="frow">
          <span class="flbl">공복 체중</span>
          <input type="number" class="finp" id="inp-weight" placeholder="kg" step="0.1" inputmode="decimal">
          <span style="font-size:12px;color:var(--text3)">kg</span>
        </div>
        <div class="frow"><span class="flbl">아침</span><input type="text" class="finp" id="inp-br" placeholder="예: 계란, 고구마"></div>
        <div class="frow"><span class="flbl">점심</span><input type="text" class="finp" id="inp-lu" placeholder="예: 닭가슴살 샐러드"></div>
        <div class="frow"><span class="flbl">저녁</span><input type="text" class="finp" id="inp-di" placeholder="예: 두부찌개"></div>
        <div class="frow"><span class="flbl">간식</span><input type="text" class="finp" id="inp-sn" placeholder="예: 방울토마토"></div>
      </div>
      <div class="card-lbl">운동</div>
      <div class="fcard">
        <div class="ex-item">
          <button class="ex-chip" id="chip-stretch" onclick="toggleEx(this)">🧘 스트레칭</button>
          <input type="number" class="ex-min-inp" id="ex-stretch" placeholder="0" inputmode="numeric">
          <span class="ex-unit">분</span>
        </div>
        <div class="ex-item">
          <button class="ex-chip" id="chip-strength" onclick="toggleEx(this)">💪 근력</button>
          <input type="number" class="ex-min-inp" id="ex-strength" placeholder="0" inputmode="numeric">
          <span class="ex-unit">분</span>
        </div>
        <div class="ex-item">
          <button class="ex-chip" id="chip-cardio" onclick="toggleEx(this)">🏃 유산소</button>
          <input type="number" class="ex-min-inp" id="ex-cardio" placeholder="0" inputmode="numeric">
          <span class="ex-unit">분</span>
        </div>
      </div>
      <div class="card-lbl">수분 섭취</div>
      <div class="card">
        <div class="water-dots" id="water-dots"></div>
        <div style="font-size:11px;color:var(--text3);margin-top:8px" id="water-cnt">0잔 / 8잔</div>
      </div>
      <div class="card-lbl">오늘 하루</div>
      <div class="fcard">
        <div class="frow" style="flex-direction:column;align-items:flex-start;gap:8px">
          <span class="flbl">신체 컨디션</span>
          <div style="display:flex;gap:6px;width:100%">
            <button class="cond-btn" id="body-1" onclick="setCond('body',1)">😴 최악</button>
            <button class="cond-btn" id="body-2" onclick="setCond('body',2)">😞 나쁨</button>
            <button class="cond-btn" id="body-3" onclick="setCond('body',3)">😐 보통</button>
            <button class="cond-btn" id="body-4" onclick="setCond('body',4)">😊 좋음</button>
            <button class="cond-btn" id="body-5" onclick="setCond('body',5)">🔥 최고</button>
          </div>
        </div>
        <div class="frow" style="flex-direction:column;align-items:flex-start;gap:8px">
          <span class="flbl">멘탈 컨디션</span>
          <div style="display:flex;gap:6px;width:100%">
            <button class="cond-btn" id="mental-1" onclick="setCond('mental',1)">😴 최악</button>
            <button class="cond-btn" id="mental-2" onclick="setCond('mental',2)">😞 나쁨</button>
            <button class="cond-btn" id="mental-3" onclick="setCond('mental',3)">😐 보통</button>
            <button class="cond-btn" id="mental-4" onclick="setCond('mental',4)">😊 좋음</button>
            <button class="cond-btn" id="mental-5" onclick="setCond('mental',5)">🔥 최고</button>
          </div>
        </div>
        <div class="frow" style="flex-direction:column;align-items:flex-start;gap:6px">
          <span class="flbl">컨디션 메모</span>
          <input type="text" class="finp" id="inp-cond-memo" placeholder="오늘 몸/마음 상태 한 줄 코멘트..."
            style="text-align:left;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;font-size:13px"
            oninput="scheduleAutoSave()">
        </div>
        <div class="frow" style="flex-direction:column;align-items:flex-start;gap:6px">
          <span class="flbl">한줄 정리</span>
          <textarea class="finp" id="inp-summary" placeholder="오늘 하루를 한 문장으로 정리해보세요..." rows="2"
            style="text-align:left;width:100%;resize:none;line-height:1.5;font-size:13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;min-height:56px"
            oninput="scheduleAutoSave()"></textarea>
        </div>
      </div>
      <button class="save-btn" onclick="saveRecord()">저장하기</button>
      <div style="height:8px"></div>
    </div>
    <div class="panel" id="panel-daily">
      <div class="dnav">
        <button class="dnav-btn" onclick="changeViewDay(-1)">‹</button>
        <span class="dnav-lbl" id="view-day-lbl"></span>
        <button class="dnav-btn" onclick="changeViewDay(1)">›</button>
      </div>
      <div id="daily-content"></div>
    </div>
    <div class="panel" id="panel-weekly">
      <div class="week-nav">
        <button onclick="changeWeek(-1)">‹ 이전</button>
        <span class="week-lbl" id="week-lbl"></span>
        <button onclick="changeWeek(1)">다음 ›</button>
      </div>
      <div class="sum-grid">
        <div class="sum-card"><div class="sum-lbl">평균 달성률</div><div class="sum-val y" id="w-avg">0%</div></div>
        <div class="sum-card"><div class="sum-lbl">완벽한 날</div><div class="sum-val g" id="w-perfect">0일</div></div>
      </div>
      <div class="week-grid" id="week-grid"></div>
      <div id="week-detail"></div>
    </div>
    <div class="panel" id="panel-monthly">
      <div class="week-nav">
        <button onclick="changeMonth(-1)">‹ 이전</button>
        <span class="week-lbl" id="month-lbl"></span>
        <button onclick="changeMonth(1)">다음 ›</button>
      </div>
      <div class="sum-grid">
        <div class="sum-card"><div class="sum-lbl">이번달 평균</div><div class="sum-val y" id="m-avg">0%</div></div>
        <div class="sum-card"><div class="sum-lbl">완벽한 날</div><div class="sum-val g" id="m-perfect">0일</div></div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div id="month-detail"></div>
    </div>
  </div>
  <nav class="bnav">
    <button class="nbtn on" id="bnav-input" onclick="sm('input')"><span class="ico">✏️</span><span>기록</span></button>
    <button class="nbtn" id="bnav-view" onclick="sm('view')"><span class="ico">📊</span><span>보기</span></button>
    <button class="nbtn" id="bnav-set" onclick="sm('set')"><span class="ico">⚙️</span><span>설정</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
const CHECK_ITEMS = [
  {id:'sleep',       label:'밤 11시 취침',      time:'23:00'},
  {id:'wake',        label:'아침 6시 기상',      time:'06:00'},
  {id:'weight',      label:'공복 몸무게 기록',   time:''},
  {id:'morning_ex',  label:'오전 운동',          time:''},
  {id:'diet',        label:'식단',               time:''},
  {id:'clean',       label:'정리정돈',           time:''},
  {id:'sns',         label:'SNS 업로드',         time:''},
  {id:'study',       label:'학습 및 개발',       time:''},
  {id:'afternoon_ex',label:'오후 운동',          time:''},
  {id:'review',      label:'하루 정리 기록',     time:''},
  {id:'skin',        label:'스킨케어',           time:''},
  {id:'vitamin',     label:'영양제',             time:''},
];

function lsGet(k, d) { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; } catch(e) { return d; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function getRec(key)      { return lsGet('p90_rec_' + key, null); }
function setRec(key, val) { lsSet('p90_rec_' + key, val); }
function getStart()       { return lsGet('p90_start', ''); }
function setStart(v)      { lsSet('p90_start', v); }

let dayOffset=0, viewOffset=0, weekOffset=0, monthOffset=0;
let waterCount=0, selWeekDate=null, selMonthDate=null, autoSaveTimer=null;
let curBodyCond=0, curMentalCond=0, curView='daily';

const DAYS=['일','월','화','수','목','금','토'];
function pad(n){return String(n).padStart(2,'0');}
function dateKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function fmtShort(d){return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtLabel(d){return `${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;}
function getDate(offset){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+offset);return d;}
function getMonday(d){const dt=new Date(d);dt.setHours(0,0,0,0);const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));return dt;}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>el.style.display='none',2000);}
function calcPct(rec){if(!rec)return 0;const done=CHECK_ITEMS.filter(item=>rec.checks?.[item.id]?.done).length;return Math.round(done/CHECK_ITEMS.length*100);}

function setCond(type,n){
  if(type==='body')curBodyCond=n;else curMentalCond=n;
  for(let i=1;i<=5;i++){const btn=document.getElementById(type+'-'+i);if(btn)btn.classList.toggle('on',i===n);}
  scheduleAutoSave();
}

function updateDday(){
  const start=getStart();
  const today=new Date();today.setHours(0,0,0,0);
  if(!start){
    document.getElementById('hdr-day').textContent='D-?';
    document.getElementById('dday-num').textContent='D-?';
    document.getElementById('dday-sub').textContent='설정에서 시작일을 입력해주세요';
    document.getElementById('dday-pct').textContent='0%';
    document.getElementById('dday-bar').style.width='0%';
    return;
  }
  const startDate=new Date(start+'T00:00:00');
  const diff=Math.floor((today-startDate)/86400000)+1;
  const day=Math.max(1,Math.min(diff,90));
  const pct=Math.round(day/90*100);
  document.getElementById('hdr-day').textContent=`D+${day}`;
  document.getElementById('dday-num').textContent=`D+${day}`;
  document.getElementById('dday-sub').textContent=`시작일: ${start.replace(/-/g,'.')}`;
  document.getElementById('dday-pct').textContent=pct+'%';
  document.getElementById('dday-bar').style.width=pct+'%';
}

function sm(name){
  ['input','view','set'].forEach(n=>document.getElementById('bnav-'+n).classList.toggle('on',n===name));
  document.getElementById('top-tabs').style.display=name==='view'?'flex':'none';
  document.getElementById('panel-input').classList.toggle('on',name==='input');
  if(name==='view'){sv(curView||'daily');}
  else if(name==='set'){showSettings();}
  else{['daily','weekly','monthly'].forEach(n=>document.getElementById('panel-'+n).classList.remove('on'));}
}

function sv(name){
  curView=name;
  ['daily','weekly','monthly'].forEach(n=>{
    document.getElementById('ttab-'+n)?.classList.toggle('on',n===name);
    document.getElementById('panel-'+n)?.classList.toggle('on',n===name);
  });
  document.getElementById('panel-input').classList.remove('on');
  document.getElementById('top-tabs').style.display='flex';
  ['input','view','set'].forEach(n=>document.getElementById('bnav-'+n).classList.toggle('on',n==='view'));
  if(name==='daily')renderDaily();
  if(name==='weekly')renderWeekly();
  if(name==='monthly')renderMonthly();
}

function changeDay(dir){dayOffset+=dir;loadInputForDay();}
function loadInputForDay(){
  const d=getDate(dayOffset);
  const key=dateKey(d);
  document.getElementById('inp-day-lbl').textContent=dayOffset===0?`오늘 (${fmtShort(d)})`:fmtLabel(d);
  const rec=getRec(key)||{};
  updateDday();
  renderChecklist(rec);
  document.getElementById('inp-weight').value=rec.weight||'';
  document.getElementById('inp-br').value=rec.breakfast||'';
  document.getElementById('inp-lu').value=rec.lunch||'';
  document.getElementById('inp-di').value=rec.dinner||'';
  document.getElementById('inp-sn').value=rec.snack||'';
  const exMap=rec.exMap||{};
  ['stretch','strength','cardio'].forEach(k=>{
    document.getElementById('chip-'+k).classList.toggle('on',!!exMap[k]);
    document.getElementById('ex-'+k).value=exMap[k]||'';
  });
  waterCount=rec.water||0;
  document.querySelectorAll('.wd').forEach((el,i)=>el.classList.toggle('on',i<waterCount));
  document.getElementById('water-cnt').textContent=waterCount?`${waterCount}잔 / 8잔 (약 ${(waterCount*0.2).toFixed(1)}L)`:'0잔 / 8잔';
  curBodyCond=rec.bodyCondition||0;
  curMentalCond=rec.mentalCondition||0;
  for(let i=1;i<=5;i++){
    const bb=document.getElementById('body-'+i);
    const mb=document.getElementById('mental-'+i);
    if(bb)bb.classList.toggle('on',i===curBodyCond);
    if(mb)mb.classList.toggle('on',i===curMentalCond);
  }
  document.getElementById('inp-summary').value=rec.summary||'';
  document.getElementById('inp-cond-memo').value=rec.condMemo||'';
}

function renderChecklist(rec){
  const checks=rec.checks||{};
  document.getElementById('checklist').innerHTML=CHECK_ITEMS.map(item=>{
    const done=!!checks[item.id]?.done;
    const note=checks[item.id]?.note||'';
    return `<div class="check-item${done?' done':''}" id="ci-${item.id}">
      <div class="check-top">
        <div class="check-box${done?' done':''}" onclick="toggleCheck('${item.id}')"></div>
        <span class="check-label" onclick="toggleCheck('${item.id}')">${item.label}</span>
        ${item.time?`<span class="check-time">${item.time}</span>`:''}
      </div>
      <div class="check-note-row">
        <textarea class="check-note" id="note-${item.id}" placeholder="비고..." rows="1"
          oninput="onNoteInput('${item.id}', this.value)">${note}</textarea>
      </div>
    </div>`;
  }).join('');
  updateCheckCount(checks);
}

function toggleCheck(id){
  const key=dateKey(getDate(dayOffset));
  const rec=getRec(key)||{};
  if(!rec.checks)rec.checks={};
  if(!rec.checks[id])rec.checks[id]={};
  rec.checks[id].done=!rec.checks[id].done;
  setRec(key,rec);
  const item=document.getElementById('ci-'+id);
  const box=item.querySelector('.check-box');
  const done=rec.checks[id].done;
  item.classList.toggle('done',done);
  box.classList.toggle('done',done);
  updateCheckCount(rec.checks);
  scheduleAutoSave();
}

function onNoteInput(id,val){
  const key=dateKey(getDate(dayOffset));
  const rec=getRec(key)||{};
  if(!rec.checks)rec.checks={};
  if(!rec.checks[id])rec.checks[id]={};
  rec.checks[id].note=val;
  setRec(key,rec);
  scheduleAutoSave();
}

function updateCheckCount(checks){
  const done=CHECK_ITEMS.filter(item=>checks[item.id]?.done).length;
  document.getElementById('check-count').textContent=`${done}/${CHECK_ITEMS.length}`;
}

function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>{
    const key=dateKey(getDate(dayOffset));
    const rec=getRec(key)||{};
    if(rec.weight||Object.keys(rec.checks||{}).length)toast('자동저장 됐어요 ✓');
  },1500);
}

function toggleEx(btn){btn.classList.toggle('on');scheduleAutoSave();}

function saveRecord(){
  const key=dateKey(getDate(dayOffset));
  const rec=getRec(key)||{};
  rec.weight=document.getElementById('inp-weight').value;
  rec.breakfast=document.getElementById('inp-br').value;
  rec.lunch=document.getElementById('inp-lu').value;
  rec.dinner=document.getElementById('inp-di').value;
  rec.snack=document.getElementById('inp-sn').value;
  rec.water=waterCount;
  rec.bodyCondition=curBodyCond;
  rec.mentalCondition=curMentalCond;
  rec.condMemo=document.getElementById('inp-cond-memo').value;
  rec.summary=document.getElementById('inp-summary').value;
  const exMap={};
  ['stretch','strength','cardio'].forEach(k=>{
    if(document.getElementById('chip-'+k).classList.contains('on'))
      exMap[k]=parseInt(document.getElementById('ex-'+k).value)||0;
  });
  rec.exMap=exMap;
  rec.exercise=Object.keys(exMap);
  rec.exMin=Object.values(exMap).reduce((s,v)=>s+v,0);
  setRec(key,rec);
  toast('저장됐어요! ✓');
}

(function(){
  const wrap=document.getElementById('water-dots');
  for(let i=0;i<8;i++){
    const b=document.createElement('button');
    b.className='wd';b.textContent='💧';
    b.onclick=()=>{
      waterCount=i+1;
      document.querySelectorAll('.wd').forEach((el,idx)=>el.classList.toggle('on',idx<waterCount));
      document.getElementById('water-cnt').textContent=`${waterCount}잔 / 8잔 (약 ${(waterCount*0.2).toFixed(1)}L)`;
      scheduleAutoSave();
    };
    wrap.appendChild(b);
  }
})();

['inp-weight','inp-br','inp-lu','inp-di','inp-sn','ex-stretch','ex-strength','ex-cardio'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('input',scheduleAutoSave);
});

function changeViewDay(dir){viewOffset+=dir;renderDaily();}
function renderDaily(){
  const d=getDate(viewOffset);
  const key=dateKey(d);
  const rec=getRec(key);
  document.getElementById('view-day-lbl').textContent=viewOffset===0?`오늘 (${fmtShort(d)})`:fmtLabel(d);
  const el=document.getElementById('daily-content');
  if(!rec){el.innerHTML='<div class="empty">기록이 없어요</div>';return;}
  const pct=calcPct(rec);
  const checks=rec.checks||{};
  const doneCnt=CHECK_ITEMS.filter(i=>checks[i.id]?.done).length;
  const EX_NM={stretch:'스트레칭',strength:'근력',cardio:'유산소'};
  el.innerHTML=`
    <div class="sum-grid">
      <div class="sum-card"><div class="sum-lbl">달성률</div><div class="sum-val y">${pct}%</div></div>
      <div class="sum-card"><div class="sum-lbl">체크완료</div><div class="sum-val g">${doneCnt}/${CHECK_ITEMS.length}</div></div>
    </div>
    <div class="card"><div class="card-lbl">체크리스트</div>
      ${CHECK_ITEMS.map(item=>{const c=checks[item.id]||{};return `<div class="detail-row">
        <span class="detail-lbl">${c.done?'✅':'⬜'}</span>
        <div class="detail-val" style="${c.done?'color:var(--text3);text-decoration:line-through':''}">
          ${item.label}${c.note?`<div style="color:var(--text3);font-size:11px;margin-top:2px">📝 ${c.note}</div>`:''}
        </div></div>`;}).join('')}
    </div>
    ${rec.weight||rec.breakfast||rec.lunch?`<div class="card"><div class="card-lbl">체중 & 식단</div>
      ${rec.weight?`<div class="detail-row"><span class="detail-lbl">체중</span><span class="detail-val">${rec.weight}kg</span></div>`:''}
      ${rec.breakfast?`<div class="detail-row"><span class="detail-lbl">아침</span><span class="detail-val">${rec.breakfast}</span></div>`:''}
      ${rec.lunch?`<div class="detail-row"><span class="detail-lbl">점심</span><span class="detail-val">${rec.lunch}</span></div>`:''}
      ${rec.dinner?`<div class="detail-row"><span class="detail-lbl">저녁</span><span class="detail-val">${rec.dinner}</span></div>`:''}
      ${rec.snack?`<div class="detail-row"><span class="detail-lbl">간식</span><span class="detail-val">${rec.snack}</span></div>`:''}
    </div>`:''}
    ${rec.exercise?.length?`<div class="card"><div class="card-lbl">운동</div>
      ${Object.entries(rec.exMap||{}).map(([k,v])=>`<div class="detail-row"><span class="detail-lbl">${EX_NM[k]||k}</span><span class="detail-val">${v}분</span></div>`).join('')}
    </div>`:''}
    ${rec.water?`<div class="card"><div class="card-lbl">수분</div>
      <div class="detail-row"><span class="detail-lbl">섭취량</span><span class="detail-val">${rec.water}잔 (약 ${(rec.water*0.2).toFixed(1)}L)</span></div>
    </div>`:''}
    ${rec.bodyCondition||rec.mentalCondition||rec.summary?`<div class="card"><div class="card-lbl">오늘 하루</div>
      ${rec.bodyCondition?`<div class="detail-row"><span class="detail-lbl">신체</span><span class="detail-val">${['','😴 최악','😞 나쁨','😐 보통','😊 좋음','🔥 최고'][rec.bodyCondition]}</span></div>`:''}
      ${rec.mentalCondition?`<div class="detail-row"><span class="detail-lbl">멘탈</span><span class="detail-val">${['','😴 최악','😞 나쁨','😐 보통','😊 좋음','🔥 최고'][rec.mentalCondition]}</span></div>`:''}
      ${rec.condMemo?`<div class="detail-row"><span class="detail-lbl">코멘트</span><span class="detail-val">${rec.condMemo}</span></div>`:''}
      ${rec.summary?`<div class="detail-row"><span class="detail-lbl">한줄정리</span><span class="detail-val">${rec.summary}</span></div>`:''}
    </div>`:''}
    <button onclick="exportDay('${key}')" style="width:100%;padding:11px;border-radius:var(--r);border:1px solid rgba(196,153,26,0.3);background:rgba(196,153,26,0.06);color:var(--accent);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;margin-top:2px">📋 이날 기록 텍스트로 복사</button>
    <div style="height:8px"></div>`;
}

function exportDay(key){
  const rec=getRec(key);
  if(!rec){toast('기록이 없어요');return;}
  const d=new Date(key+'T00:00:00');
  const EX_NM={stretch:'스트레칭',strength:'근력',cardio:'유산소'};
  const checks=rec.checks||{};
  const pct=calcPct(rec);
  const doneCnt=CHECK_ITEMS.filter(i=>checks[i.id]?.done).length;
  const start=getStart();
  let dayNum='';
  if(start){const sd=new Date(start+'T00:00:00');const diff=Math.floor((d-sd)/86400000)+1;if(diff>0&&diff<=90)dayNum=` (D+${diff})`;}
  let text=`🔥 90일 인간개조 프로젝트${dayNum}\n`;
  text+=`📅 ${key.replace(/-/g,'.')} ${fmtLabel(d).split(' ').slice(-1)[0]}\n`;
  text+=`✅ 달성률: ${pct}% (${doneCnt}/${CHECK_ITEMS.length})\n\n`;
  text+=`[ 체크리스트 ]\n`;
  CHECK_ITEMS.forEach(item=>{const c=checks[item.id]||{};text+=`${c.done?'✅':'⬜'} ${item.label}`;if(c.note)text+=` → ${c.note}`;text+='\n';});
  if(rec.weight||rec.breakfast||rec.lunch||rec.dinner||rec.snack){
    text+=`\n[ 체중 & 식단 ]\n`;
    if(rec.weight)text+=`⚖️ 체중: ${rec.weight}kg\n`;
    if(rec.breakfast)text+=`🌅 아침: ${rec.breakfast}\n`;
    if(rec.lunch)text+=`☀️ 점심: ${rec.lunch}\n`;
    if(rec.dinner)text+=`🌙 저녁: ${rec.dinner}\n`;
    if(rec.snack)text+=`🍎 간식: ${rec.snack}\n`;
  }
  if(rec.exercise?.length){
    text+=`\n[ 운동 ]\n`;
    Object.entries(rec.exMap||{}).forEach(([k,v])=>{text+=`💪 ${EX_NM[k]||k}: ${v}분\n`;});
  }
  if(rec.water){text+=`\n[ 수분 ]\n💧 ${rec.water}잔 (약 ${(rec.water*0.2).toFixed(1)}L)\n`;}
  const COND_LBL=['','😴 최악','😞 나쁨','😐 보통','😊 좋음','🔥 최고'];
  if(rec.bodyCondition||rec.mentalCondition||rec.summary){
    text+=`\n[ 오늘 하루 ]\n`;
    if(rec.bodyCondition)text+=`신체 컨디션: ${COND_LBL[rec.bodyCondition]}\n`;
    if(rec.mentalCondition)text+=`멘탈 컨디션: ${COND_LBL[rec.mentalCondition]}\n`;
    if(rec.condMemo)text+=`컨디션 메모: ${rec.condMemo}\n`;
    if(rec.summary)text+=`한줄정리: ${rec.summary}\n`;
  }
  if(navigator.share)navigator.share({text}).catch(()=>{});
  else navigator.clipboard.writeText(text).then(()=>toast('복사됐어요! 📋')).catch(()=>toast('복사 실패'));
}

function changeWeek(dir){weekOffset+=dir;selWeekDate=null;renderWeekly();}
function renderWeekly(){
  const today=new Date();today.setHours(0,0,0,0);
  const base=getMonday(today);
  base.setDate(base.getDate()+weekOffset*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(base);d.setDate(d.getDate()+i);return d;});
  document.getElementById('week-lbl').textContent=`${fmtShort(days[0])} ~ ${fmtShort(days[6])}`;
  const pcts=days.map(d=>calcPct(getRec(dateKey(d))));
  const validP=pcts.filter(p=>p>0);
  const avg=validP.length?Math.round(validP.reduce((s,v)=>s+v,0)/validP.length):0;
  const perfect=pcts.filter(p=>p===100).length;
  document.getElementById('w-avg').textContent=avg+'%';
  document.getElementById('w-perfect').textContent=perfect+'일';
  document.getElementById('week-grid').innerHTML=days.map((d,i)=>{
    const key=dateKey(d);const pct=pcts[i];
    const isToday=dateKey(d)===dateKey(today);const isSel=selWeekDate===key;
    return `<div class="wday${isToday?' today':''}${isSel?' sel':''}" onclick="selWeek('${key}')">
      <div class="wday-name">${DAYS[d.getDay()]}</div>
      <div class="wday-date">${fmtShort(d)}</div>
      <div class="wday-pct ${pct===100?'full':pct===0?'empty':''}">${pct?pct+'%':'—'}</div>
      <div class="wday-bar"><div class="wday-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  const itemStats=CHECK_ITEMS.map(item=>{
    const cnt=days.filter(d=>getRec(dateKey(d))?.checks?.[item.id]?.done).length;
    return {label:item.label,cnt};
  }).sort((a,b)=>b.cnt-a.cnt);
  let html='<div class="card"><div class="card-lbl">항목별 달성 횟수</div>';
  itemStats.forEach(s=>{html+=`<div class="stat-row"><div class="stat-label">${s.label}</div><div class="stat-track"><div class="stat-fill" style="width:${Math.round(s.cnt/7*100)}%"></div></div><div class="stat-val">${s.cnt}/7</div></div>`;});
  html+='</div>';
  if(selWeekDate)html+=renderDayDetail(selWeekDate);
  document.getElementById('week-detail').innerHTML=html;
}

function selWeek(key){selWeekDate=selWeekDate===key?null:key;renderWeekly();}

function changeMonth(dir){monthOffset+=dir;selMonthDate=null;renderMonthly();}
function renderMonthly(){
  const today=new Date();today.setHours(0,0,0,0);
  const base=new Date(today.getFullYear(),today.getMonth()+monthOffset,1);
  const yr=base.getFullYear(),mo=base.getMonth();
  document.getElementById('month-lbl').textContent=`${yr}년 ${mo+1}월`;
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const monthRecs=Array.from({length:daysInMonth},(_,i)=>{const d=new Date(yr,mo,i+1);return{dt:d,key:dateKey(d),rec:getRec(dateKey(d))};});
  const pcts=monthRecs.map(({rec})=>calcPct(rec));
  const valid=pcts.filter(p=>p>0);
  const avg=valid.length?Math.round(valid.reduce((s,v)=>s+v,0)/valid.length):0;
  document.getElementById('m-avg').textContent=avg+'%';
  document.getElementById('m-perfect').textContent=pcts.filter(p=>p===100).length+'일';
  const cal=document.getElementById('cal-grid');
  cal.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach(d=>{const h=document.createElement('div');h.className='cal-head';h.textContent=d;cal.appendChild(h);});
  const firstDay=new Date(yr,mo,1).getDay();
  for(let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='cal-day other';const pd=new Date(yr,mo,1-firstDay+i);el.innerHTML=`<div class="cdn">${pd.getDate()}</div>`;cal.appendChild(el);}
  monthRecs.forEach(({dt,key,rec},i)=>{
    const pct=pcts[i];const isToday=dateKey(dt)===dateKey(today);const isSel=selMonthDate===key;
    const el=document.createElement('div');
    el.className='cal-day'+(rec?' has':'')+(isSel?' sel':'')+(isToday?' today':'');
    el.innerHTML=`<div class="cdn">${dt.getDate()}</div>${pct?`<div class="cpct">${pct}%</div><div class="cbar"><div class="cbar-fill" style="width:${pct}%"></div></div>`:''}`;
    el.onclick=()=>{selMonthDate=selMonthDate===key?null:key;renderMonthly();};
    cal.appendChild(el);
  });
  document.getElementById('month-detail').innerHTML=selMonthDate?renderDayDetail(selMonthDate):'';
}

function renderDayDetail(key){
  const rec=getRec(key);
  if(!rec)return '<div class="empty">기록이 없어요</div>';
  const d=new Date(key+'T00:00:00');
  const checks=rec.checks||{};
  return `<div class="detail-card">
    <div class="detail-date">${fmtLabel(d)} · ${calcPct(rec)}%</div>
    ${CHECK_ITEMS.map(item=>{const c=checks[item.id]||{};return `<div class="detail-row">
      <span class="detail-lbl">${c.done?'✅':'⬜'}</span>
      <div class="detail-val" style="${c.done?'color:var(--text3);text-decoration:line-through':''}">
        ${item.label}${c.note?`<div style="font-size:11px;color:var(--text3);margin-top:2px">📝 ${c.note}</div>`:''}
      </div></div>`;}).join('')}
    ${rec.weight?`<div class="detail-row"><span class="detail-lbl">체중</span><span class="detail-val">${rec.weight}kg</span></div>`:''}
    ${rec.bodyCondition?`<div class="detail-row"><span class="detail-lbl">신체</span><span class="detail-val">${['','😴 최악','😞 나쁨','😐 보통','😊 좋음','🔥 최고'][rec.bodyCondition]}</span></div>`:''}
    ${rec.mentalCondition?`<div class="detail-row"><span class="detail-lbl">멘탈</span><span class="detail-val">${['','😴 최악','😞 나쁨','😐 보통','😊 좋음','🔥 최고'][rec.mentalCondition]}</span></div>`:''}
    ${rec.condMemo?`<div class="detail-row"><span class="detail-lbl">코멘트</span><span class="detail-val">${rec.condMemo}</span></div>`:''}
    ${rec.summary?`<div class="detail-row"><span class="detail-lbl">한줄정리</span><span class="detail-val">${rec.summary}</span></div>`:''}
  </div>
  <button onclick="exportDay('${key}')" style="width:100%;padding:10px;border-radius:var(--r);border:1px solid rgba(196,153,26,0.3);background:rgba(196,153,26,0.06);color:var(--accent);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;margin-top:2px">📋 텍스트로 복사</button>
  <div style="height:6px"></div>`;
}

function showSettings(){
  ['daily','weekly','monthly'].forEach(n=>document.getElementById('panel-'+n).classList.remove('on'));
  document.getElementById('panel-input').classList.remove('on');
  let panel=document.getElementById('panel-set');
  if(!panel){panel=document.createElement('div');panel.id='panel-set';panel.className='panel';document.querySelector('.screen').appendChild(panel);}
  panel.classList.add('on');
  const start=getStart();
  panel.innerHTML=`<div class="card-lbl">프로젝트 설정</div>
    <div class="fcard" style="margin-bottom:12px">
      <div class="frow"><span class="flbl">시작일</span><input type="date" class="finp" id="set-start" value="${start}" style="text-align:right"></div>
    </div>
    <button class="save-btn" onclick="saveSettings()">저장하기</button>
    <div style="height:8px"></div>`;
}

function saveSettings(){
  const v=document.getElementById('set-start').value;
  if(v){setStart(v);toast('설정이 저장됐어요 ✓');updateDday();}
  else toast('시작일을 입력해주세요');
}

loadInputForDay();
</script>
</body>
</html>
